<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #f9f8f6;
    font-family: -apple-system, 'Inter', sans-serif;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .dot-grid {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(0,0,0,0.055) 1px, transparent 1px);
    background-size: 26px 26px;
  }
  .card {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 32px;
    width: 100%; height: 100%;
  }
  .domain {
    position: absolute; bottom: 40px; right: 56px;
    font-size: 15px; font-weight: 600; color: #999; letter-spacing: 0.05em;
  }
</style>
</head>
<body>
  <div class="dot-grid"></div>
  <div class="card">
    <img src="images/studio-north-logo.webp" alt="Studio North" style="height:220px;width:auto;display:block;">
    <p style="font-size:20px;color:#555;letter-spacing:0.01em;text-align:center;">Custom websites for businesses ready to grow.</p>
  </div>
  <div class="domain">studio-north.uk</div>
</body>
</html>
